<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .device { width: 390px; height: 844px; position: relative; border: 4px solid #fff; border-radius: 20px; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
  .crosshair-y { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: red; z-index: 10; }
</style>
</head>
<body>
<div class="device">
  <canvas id="c"></canvas>
  <div class="crosshair-y"></div>
</div>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.src = '/static/images/sequence/frame-80.webp';
  
  canvas.width = 390;
  canvas.height = 844;

  const container = document.body;
  
  img.onload = () => {
    // We will test 0.52 to 0.60
    const tests = [0.52, 0.54, 0.56, 0.58, 0.60];
    
    tests.forEach(focal => {
      const wrapper = document.createElement('div');
      wrapper.className = 'device';
      const cnvs = document.createElement('canvas');
      cnvs.width = 390; cnvs.height = 844;
      const ctx = cnvs.getContext('2d');
      const line = document.createElement('div');
      line.className = 'crosshair-y';
      
      wrapper.appendChild(cnvs);
      wrapper.appendChild(line);
      container.appendChild(wrapper);

      const cw = cnvs.width, ch = cnvs.height;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = Math.max(cw / iw, ch / ih);
      const sw = iw * scale, sh = ih * scale;
      
      let sx = (cw / 2) - (sw * focal);
      sx = Math.min(0, Math.max(cw - sw, sx));
      const sy = (ch - sh) / 2;
      
      ctx.drawImage(img, sx, sy, sw, sh);
      
      ctx.fillStyle = 'white';
      ctx.font = '24px Arial';
      ctx.fillText("FX: " + focal, 20, 60);
    });
  };
</script>
</body>
</html>
